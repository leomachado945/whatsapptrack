<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Processando arquivos...</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:linear-gradient(to bottom,#0f172a,#111827,#1e293b);
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .card{
      width:100%;
      max-width:430px;
      background:#111827;
      border:1px solid rgba(255,255,255,.08);
      border-radius:24px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
      text-align:center;
    }

    .icon{
      width:90px;
      height:90px;
      border-radius:50%;
      background:#22c55e20;
      display:flex;
      align-items:center;
      justify-content:center;
      margin:0 auto 24px;
      font-size:42px;
    }

    h1{
      font-size:30px;
      font-weight:800;
      line-height:1.2;
    }

    p{
      margin-top:14px;
      color:#9ca3af;
      line-height:1.6;
      font-size:14px;
    }

    .bar{
      width:100%;
      height:14px;
      background:#1f2937;
      border-radius:999px;
      overflow:hidden;
      margin-top:28px;
    }

    .progress{
      width:35%;
      height:100%;
      background:#22c55e;
      border-radius:999px;
      animation:move 2s infinite linear;
    }

    @keyframes move{
      0%{
        transform:translateX(-100%);
      }

      100%{
        transform:translateX(300%);
      }
    }

    .status{
      margin-top:18px;
      font-size:14px;
      color:#d1d5db;
    }

    .info{
      margin-top:28px;
      background:#1f2937;
      border-radius:18px;
      padding:18px;
      text-align:left;
    }

    .info strong{
      display:block;
      margin-bottom:8px;
      color:#22c55e;
    }

  </style>
</head>
<body>

  <div class="card">

    <div class="icon">
      📦
    </div>

    <h1>
      Processando arquivos
    </h1>

    <p>
      Seu conteúdo está sendo preparado.
      Dependendo do tamanho dos arquivos,
      isso pode levar algum tempo.
    </p>

    <div class="bar">
      <div class="progress"></div>
    </div>

    <div class="status" id="status">
      Sincronizando arquivos...
    </div>

    <div class="info">
      <strong>Importante</strong>

      Você pode fechar esta página e retornar mais tarde.
      O processamento continuará normalmente.
    </div>

  </div>

<script>

  const status = document.getElementById('status');

  const texts = [
    'Sincronizando arquivos...',
    'Compactando conteúdo...',
    'Validando integridade...',
    'Preparando download...',
    'Finalizando processamento...'
  ];

  let i = 0;

  setInterval(() => {

    status.innerText = texts[i];

    i++;

    if(i >= texts.length){
      i = 0;
    }

  }, 2500);

</script>

</body>
</html>
